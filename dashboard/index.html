<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Marketplace Scraper — Belfast</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; }
  header { background: #16213e; padding: 20px 28px; border-bottom: 2px solid #0f3460; }
  header h1 { font-size: 20px; color: #e94560; letter-spacing: .5px; }
  header p { color: #888; font-size: 12px; margin-top: 4px; }
  nav { display: flex; gap: 0; background: #16213e; padding: 0 28px; border-bottom: 1px solid #0f3460; }
  nav button { background: none; border: none; color: #aaa; padding: 12px 20px; cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent; transition: color .2s, border-color .2s; }
  nav button.active { color: #e94560; border-bottom-color: #e94560; }
  nav button:hover:not(.active) { color: #e0e0e0; }
  main { padding: 24px 28px; }
  .tab { display: none; }
  .tab.active { display: block; }
  details { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
  summary { padding: 12px 16px; cursor: pointer; font-weight: 600; color: #e0e0e0; background: #1a2744; user-select: none; display: flex; align-items: center; gap: 8px; }
  summary::marker { color: #e94560; }
  summary .kw { color: #e94560; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
  summary .count { margin-left: auto; background: #0f3460; color: #aaa; font-size: 11px; padding: 2px 8px; border-radius: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #0f2340; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; padding: 10px 12px; text-align: left; }
  td { padding: 10px 12px; border-bottom: 1px solid #1e2d4a; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1e2d4a; }
  .profit { font-weight: 700; }
  .profit.green { color: #4caf82; }
  .profit.amber { color: #f0a500; }
  .roi { font-size: 12px; color: #aaa; }
  .condition { font-size: 11px; padding: 2px 7px; border-radius: 10px; display: inline-block; }
  .condition.new, .condition.like_new { background: #1b4332; color: #4caf82; }
  .condition.faulty { background: #4a1942; color: #e94560; }
  .condition.used { background: #1e2d4a; color: #aaa; }
  a.listing-link { color: #63a4ff; text-decoration: none; }
  a.listing-link:hover { text-decoration: underline; }
  .search-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .search-bar input { background: #16213e; border: 1px solid #0f3460; color: #e0e0e0; padding: 8px 14px; border-radius: 6px; font-size: 14px; width: 300px; outline: none; }
  .search-bar input:focus { border-color: #e94560; }
  .empty { color: #555; padding: 40px; text-align: center; }
  #listings-table td:nth-child(5) { color: #888; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>FB Marketplace Scraper — Belfast</h1>
  <p id="last-scraped">Loading...</p>
</header>
<nav>
  <button class="active" onclick="switchTab('deals', this)">Top Deals</button>
  <button onclick="switchTab('listings', this)">All Listings</button>
</nav>
<main>
  <div id="deals" class="tab active">
    <div id="deals-content"><p class="empty">Loading deals...</p></div>
  </div>
  <div id="listings" class="tab">
    <div class="search-bar">
      <input id="search" type="text" placeholder="Search listings..." oninput="filterListings()">
      <span id="listing-count" style="color:#888;font-size:12px;"></span>
    </div>
    <div id="listings-content"><p class="empty">Click the tab to load listings.</p></div>
  </div>
</main>
<script>
  let listingsLoaded = false;

  function switchTab(id, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    if (id === 'listings' && !listingsLoaded) loadListings();
  }

  function profitClass(p) { return p >= 100 ? 'green' : 'amber'; }

  function conditionLabel(c) {
    const labels = { new: 'New', like_new: 'Like New', faulty: 'Faulty', used: 'Used' };
    return `<span class="condition ${c ?? 'used'}">${labels[c] ?? 'Used'}</span>`;
  }

  async function loadDeals() {
    const res = await fetch('/api/profit');
    const data = await res.json();
    if (!data) { document.getElementById('deals-content').innerHTML = '<p class="empty">No profit data yet — run the scraper first.</p>'; return; }

    const keywords = Object.keys(data);
    if (!keywords.length) { document.getElementById('deals-content').innerHTML = '<p class="empty">No profitable deals found in the last run.</p>'; return; }

    let firstTs = null;
    const html = keywords.map(kw => {
      const deals = data[kw];
      if (!firstTs && deals[0]?.scrapedAt) firstTs = deals[0].scrapedAt;
      const rows = deals.map((d, i) => `
        <tr>
          <td>#${i + 1}</td>
          <td>${d.matchedItem ?? '—'}</td>
          <td>${d.price ?? '—'}</td>
          <td>£${d.estimatedResaleGBP}</td>
          <td>£${d.netAfterFeesGBP}</td>
          <td class="profit ${profitClass(d.estimatedProfitGBP)}">£${d.estimatedProfitGBP}</td>
          <td class="roi">${d.roiPercent != null ? d.roiPercent + '%' : '—'}</td>
          <td>${conditionLabel(d.condition)}</td>
          <td>${d.location ?? '—'}</td>
          <td><a class="listing-link" href="${d.url}" target="_blank" rel="noopener">${d.title ?? 'View'}</a></td>
        </tr>`).join('');
      return `
        <details open>
          <summary><span class="kw">${kw}</span><span class="count">${deals.length} deal${deals.length !== 1 ? 's' : ''}</span></summary>
          <table>
            <thead><tr><th>#</th><th>Item</th><th>Buy</th><th>Est. Resale</th><th>Net After Fees</th><th>Profit</th><th>ROI%</th><th>Condition</th><th>Location</th><th>Listing</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </details>`;
    }).join('');

    document.getElementById('deals-content').innerHTML = html;
    if (firstTs) document.getElementById('last-scraped').textContent = 'Last scraped: ' + new Date(firstTs).toLocaleString();
  }

  let allListings = [];

  async function loadListings() {
    listingsLoaded = true;
    const res = await fetch('/api/listings');
    allListings = await res.json() ?? [];
    renderListings(allListings);
  }

  function renderListings(items) {
    document.getElementById('listing-count').textContent = `${items.length} listings`;
    if (!items.length) { document.getElementById('listings-content').innerHTML = '<p class="empty">No listings found.</p>'; return; }
    const rows = items.map(l => `
      <tr>
        <td><a class="listing-link" href="${l.url}" target="_blank" rel="noopener">${l.title ?? '—'}</a></td>
        <td>${l.price ?? '—'}</td>
        <td>${l.location ?? '—'}</td>
        <td>${l.keyword ?? '—'}</td>
        <td>${l.scrapedAt ? new Date(l.scrapedAt).toLocaleString() : '—'}</td>
        <td><a class="listing-link" href="${l.url}" target="_blank" rel="noopener">Open</a></td>
      </tr>`).join('');
    document.getElementById('listings-content').innerHTML = `
      <table id="listings-table">
        <thead><tr><th>Title</th><th>Price</th><th>Location</th><th>Keyword</th><th>Scraped At</th><th>Link</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function filterListings() {
    const q = document.getElementById('search').value.toLowerCase();
    renderListings(q ? allListings.filter(l =>
      (l.title ?? '').toLowerCase().includes(q) ||
      (l.keyword ?? '').toLowerCase().includes(q) ||
      (l.location ?? '').toLowerCase().includes(q)
    ) : allListings);
  }

  loadDeals();
</script>
</body>
</html>
